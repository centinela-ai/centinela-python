# Alternative to a native Postgres install. See README ("Con Docker").
services:
  db:
    image: postgres:16
    container_name: centinela-db
    environment:
      POSTGRES_USER: centinela
      POSTGRES_PASSWORD: centinela
      POSTGRES_DB: centinela_dev
    ports:
      - "5432:5432"
    volumes:
      - centinela_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centinela -d centinela_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  centinela_pgdata:
